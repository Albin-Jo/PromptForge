server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vite content-hashes every asset filename, so they are immutable once built.
    # One year max-age + immutable tells browsers (and CDNs) never to re-validate.
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: react-router owns all routing, so any path that isn't a real
    # file must resolve to index.html — otherwise nginx 404s on a hard refresh of
    # /prompts/my-prompt/edit or any other deep route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
