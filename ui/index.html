<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptForge</title>
    <!-- Anti-FOUC: set the theme class before React mounts so dark-mode users never
         see a white flash. Mirrors ThemeProvider's STORAGE_KEY + system logic. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("pf-theme") || "system";
          var dark =
            t === "dark" ||
            (t === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
